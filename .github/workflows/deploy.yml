name: CI/CD Snapgram → GKE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: snapgram-cluster
  GKE_ZONE: us-central1-a
  BACKEND_IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/snapgram/snapgram-backend
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/snapgram/snapgram-frontend

jobs:
  # ── Job 1 : Tests ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Lint backend
        run: cd backend && npx eslint . --ext .js --ignore-pattern node_modules/ || true

      - name: Check backend syntax
        run: cd backend && node --check server.js

  # ── Job 2 : Build & Push images ────────────────────────────────
  build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build & Push backend
        run: |
          docker build -t $BACKEND_IMAGE:$GITHUB_SHA -t $BACKEND_IMAGE:latest ./backend
          docker push $BACKEND_IMAGE:$GITHUB_SHA
          docker push $BACKEND_IMAGE:latest

      - name: Build & Push frontend
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=/api \
            --build-arg REACT_APP_SOCKET_URL="" \
            -t $FRONTEND_IMAGE:$GITHUB_SHA \
            -t $FRONTEND_IMAGE:latest \
            ./frontend
          docker push $FRONTEND_IMAGE:$GITHUB_SHA
          docker push $FRONTEND_IMAGE:latest

  # ── Job 3 : Deploy sur GKE ─────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Remplacer PROJECT_ID dans les manifests
        run: |
          sed -i "s/PROJECT_ID/$PROJECT_ID/g" k8s/backend.yaml k8s/frontend.yaml

      - name: Appliquer les manifests Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/mongodb.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml

      - name: Mettre à jour les images avec le nouveau SHA
        run: |
          kubectl set image deployment/backend \
            backend=$BACKEND_IMAGE:$GITHUB_SHA \
            -n snapgram
          kubectl set image deployment/frontend \
            frontend=$FRONTEND_IMAGE:$GITHUB_SHA \
            -n snapgram

      - name: Attendre le déploiement backend
        run: kubectl rollout status deployment/backend -n snapgram --timeout=120s

      - name: Attendre le déploiement frontend
        run: kubectl rollout status deployment/frontend -n snapgram --timeout=120s

      - name: Afficher l'IP publique
        run: kubectl get service frontend -n snapgram