name: CI/CD Snapgram → GKE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: snapgram-cluster
  GKE_ZONE: us-central1-a
  REGION: us-central1

jobs:

# =========================
# TEST
# =========================
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Check backend syntax
        run: |
          cd backend
          node --check server.js

# =========================
# BUILD
# =========================
  build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: test

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Create Artifact Registry
        run: |
          gcloud artifacts repositories create snapgram \
            --repository-format=docker \
            --location=us-central1 \
            --description="Snapgram Docker Images" \
            --project=${{ secrets.GCP_PROJECT_ID }} || true

      - name: Build & Push backend
        run: |
          BACKEND_IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/snapgram/snapgram-backend"

          docker build \
            -t $BACKEND_IMAGE:${{ github.sha }} \
            -t $BACKEND_IMAGE:latest \
            ./backend

          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      - name: Build & Push frontend
        run: |
          FRONTEND_IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/snapgram/snapgram-frontend"

          docker build \
            --build-arg REACT_APP_API_URL=/api \
            -t $FRONTEND_IMAGE:${{ github.sha }} \
            -t $FRONTEND_IMAGE:latest \
            ./frontend

          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest

# =========================
# DEPLOY
# =========================
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Replace PROJECT_ID in manifests
        run: |
          sed -i "s/PROJECT_ID/${{ secrets.GCP_PROJECT_ID }}/g" k8s/backend.yaml
          sed -i "s/PROJECT_ID/${{ secrets.GCP_PROJECT_ID }}/g" k8s/frontend.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/backend.yaml  -n snapgram
          kubectl apply -f k8s/frontend.yaml -n snapgram
          kubectl apply -f k8s/ingress.yaml  -n snapgram
          kubectl apply -f k8s/mongodb.yaml -n snapgram
          kubectl apply -f k8s/redis.yaml  -n snapgram
  

      - name: Update images
        run: |
          BACKEND_IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/snapgram/snapgram-backend"
          FRONTEND_IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/snapgram/snapgram-frontend"

          kubectl set image deployment/backend \
            backend=$BACKEND_IMAGE:${{ github.sha }} \
            -n snapgram

          kubectl set image deployment/frontend \
            frontend=$FRONTEND_IMAGE:${{ github.sha }} \
            -n snapgram

      - name: Wait rollout
        run: |
          kubectl rollout status deployment/backend  -n snapgram --timeout=300s
          kubectl rollout status deployment/frontend -n snapgram --timeout=300s

      - name: Show ingress
        run: |
          kubectl get ingress -n snapgram