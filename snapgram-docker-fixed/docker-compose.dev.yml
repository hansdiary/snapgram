version: "3.9"

# Utilisation : docker compose -f docker-compose.dev.yml up
# Surcharge docker-compose.yml pour le développement avec hot reload

services:

  mongo:
    image: mongo:7
    container_name: snapgram_mongo_dev
    ports:
      - "27017:27017"   # accès direct depuis l'hôte (Compass, etc.)
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - snapgram_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: snapgram_backend_dev
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/snapgram
      JWT_SECRET: dev_secret_key
      CLIENT_URL: http://localhost:3000
      NODE_ENV: development
    volumes:
      - ./backend:/app               # montage du code source
      - /app/node_modules            # évite d'écraser node_modules du container
      - uploads_dev:/app/uploads
    ports:
      - "5000:5000"
    networks:
      - snapgram_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: snapgram_frontend_dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"   # hot reload dans Docker
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - snapgram_net

volumes:
  mongo_dev_data:
  uploads_dev:

networks:
  snapgram_net:
    driver: bridge
