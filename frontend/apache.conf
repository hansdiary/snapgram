ServerName localhost

# =========================
# LOGS (Docker / Kubernetes)
# =========================
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

# =========================
# MODULES PROXY
# =========================
ProxyRequests Off
ProxyPreserveHost On

# IMPORTANT : backend Kubernetes DNS direct
# (on évite Define qui est fragile ici)
# backend service in snapgram namespace
# http://backend:5000 fonctionne aussi si même namespace

# =========================
# BACKEND URL
# =========================
# recommandé en dur pour éviter interpolation Apache cassée
# (Define n'est pas fiable dans ProxyPass)
# =========================

# =========================
# API BACKEND
# =========================
<Location "/api/">
    ProxyPass http://backend.snapgram.svc.cluster.local:5000/
    ProxyPassReverse http://backend.snapgram.svc.cluster.local:5000/
    ProxyTimeout 60
</Location>

# =========================
# SOCKET.IO (WebSocket)
# =========================
<Location "/socket.io/">
    ProxyPass http://backend.snapgram.svc.cluster.local:5000/socket.io/
    ProxyPassReverse http://backend.snapgram.svc.cluster.local:5000/socket.io/
    ProxyTimeout 3600
</Location>

# IMPORTANT: WebSocket upgrade support
RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule /socket.io/(.*) ws://backend.snapgram.svc.cluster.local:5000/socket.io/$1 [P,L]

# =========================
# UPLOADS
# =========================
<Location "/uploads/">
    ProxyPass http://backend.snapgram.svc.cluster.local:5000/uploads/
    ProxyPassReverse http://backend.snapgram.svc.cluster.local:5000/uploads/
</Location>

# =========================
# REACT SPA (frontend)
# =========================
DocumentRoot /usr/local/apache2/htdocs/

<Directory "/usr/local/apache2/htdocs/">
    Options FollowSymLinks
    AllowOverride All
    Require all granted

    RewriteEngine On

    # ne pas casser API / socket / uploads
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/socket.io/
    RewriteCond %{REQUEST_URI} !^/uploads/

    # fallback React SPA
    RewriteRule . /index.html [L]
</Directory>