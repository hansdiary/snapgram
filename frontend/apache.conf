# Activer le rewrite engine
RewriteEngine On

# Rediriger les requêtes API vers le backend
<Location /api>
    ProxyPass http://backend-service:5000/api
    ProxyPassReverse http://backend-service:5000/api
</Location>

# Rediriger les WebSocket (Socket.IO)
<Location /socket.io>
    ProxyPass ws://backend-service:5000/socket.io
    ProxyPassReverse ws://backend-service:5000/socket.io
</Location>

# Gérer le routing React (SPA)
<Directory /usr/local/apache2/htdocs>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
    
    # Rediriger toutes les requêtes non-fichiers vers index.html
    RewriteEngine On
    RewriteBase /
    RewriteRule ^index\.html$ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /index.html [L]
</Directory>

# Headers de sécurité
<IfModule mod_headers.c>
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "DENY"
    Header set X-XSS-Protection "1; mode=block"
</IfModule>

# Compression gzip
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
</IfModule>