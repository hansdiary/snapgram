ServerName localhost

# =========================
# LOGS (Docker / Kubernetes)
# =========================
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

# =========================
# MODULES PROXY
# =========================
ProxyRequests Off
ProxyPreserveHost On

RewriteEngine On

# =========================
# BACKEND DNS K8S
# =========================
# backend.snapgram.svc.cluster.local:5000

# =========================
# API BACKEND
# =========================
<Location "/api/">
    ProxyPass http://backend.snapgram.svc.cluster.local:5000/api/
    ProxyPassReverse http://backend.snapgram.svc.cluster.local:5000/api/
</Location>

# =========================
# SOCKET.IO
# =========================
<Location "/socket.io/">
    ProxyPass http://backend.snapgram.svc.cluster.local:5000/socket.io/
    ProxyPassReverse http://backend.snapgram.svc.cluster.local:5000/socket.io/
</Location>

# =========================
# UPLOADS
# =========================
<Location "/uploads/">
    ProxyPass http://backend.snapgram.svc.cluster.local:5000/uploads/
    ProxyPassReverse http://backend.snapgram.svc.cluster.local:5000/uploads/
</Location>

# =========================
# REACT SPA
# =========================
DocumentRoot /usr/local/apache2/htdocs/

<Directory "/usr/local/apache2/htdocs/">
    Options FollowSymLinks
    AllowOverride All
    Require all granted

    RewriteEngine On

    # éviter proxy collision
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/socket.io/
    RewriteCond %{REQUEST_URI} !^/uploads/

    RewriteRule . /index.html [L]
</Directory>