ServerName localhost
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 combined

ProxyRequests Off
ProxyPreserveHost On

ProxyPass /api/ http://backend:5000/api/
ProxyPassReverse /api/ http://backend:5000/api/

ProxyPass /socket.io/ http://backend:5000/socket.io/
ProxyPassReverse /socket.io/ http://backend:5000/socket.io/

ProxyPass /uploads/ http://backend:5000/uploads/
ProxyPassReverse /uploads/ http://backend:5000/uploads/

DocumentRoot /usr/local/apache2/htdocs/

<Directory "/usr/local/apache2/htdocs/">
    Options FollowSymLinks
    AllowOverride All
    Require all granted
    RewriteEngine On
    RewriteBase /
    RewriteRule ^index\.html$ - [L]
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/socket.io/
    RewriteCond %{REQUEST_URI} !^/uploads/
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /index.html [L]
</Directory>