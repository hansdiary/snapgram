apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snapgram-ingress
  namespace: snapgram

  annotations:
    kubernetes.io/ingress.class: "gce"

    # IP statique GCP
    kubernetes.io/ingress.global-static-ip-name: "snapgram-ip"

    # Timeout long pour WebSocket
    ingress.gcp.kubernetes.io/backend-protocol: "HTTP"

spec:
  rules:
    - http:
        paths:

          # =========================
          # API BACKEND
          # =========================
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000

          # =========================
          # SOCKET.IO
          # =========================
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000

          # =========================
          # FRONTEND REACT
          # =========================
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80