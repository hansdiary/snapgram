apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snapgram-ingress
  namespace: snapgram
  annotations:
    kubernetes.io/ingress.class: "gce"
    # Augmenter timeout pour WebSocket
    ingress.gcp.kubernetes.io/client-timeout: "3600s"
spec:
  rules:
    - http:
        paths:
          # FRONTEND
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          # BACKEND API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000

          # SOCKET.IO - AJOUTER CE BLOC
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000