apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snapgram-ingress
  namespace: snapgram
  annotations:
    kubernetes.io/ingress.global-static-ip-name: snapgram-ip
spec:
  ingressClassName: gce
  rules:
  - http:
      paths:
      - path: /api/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend-nodeport
            port:
              number: 5000
      - path: /socket.io/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: backend-nodeport
            port:
              number: 5000
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend
            port:
              number: 80