apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: snapgram-ingress
  namespace: snapgram

  annotations:
    kubernetes.io/ingress.class: "gce"

spec:
  rules:
    - http:
        paths:

          # Backend API
          - path: /api
            pathType: Prefix

            backend:
              service:
                name: backend-service
                port:
                  number: 80

          # Frontend
          - path: /
            pathType: Prefix

            backend:
              service:
                name: frontend-service
                port:
                  number: 80