apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: snapgram
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: us-central1-docker.pkg.dev/PROJECT_ID/snapgram/snapgram-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80

---
# NodePort requis pour GCE Ingress
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: snapgram
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: NodePort