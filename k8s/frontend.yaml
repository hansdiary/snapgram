apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: snapgram
  annotations:
    cloud.google.com/neg: '{"ingress": true}'

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: us-central1-docker.pkg.dev/PROJECT_ID/snapgram/snapgram-frontend:latest

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service

metadata:
  name: frontend-service
  namespace: snapgram

spec:
  selector:
    app: frontend

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

  type: ClusterIP