apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: snapgram
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/PROJECT_ID/snapgram/snapgram-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              value: mongodb://mongo:27017/snapgram
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: snapgram-secrets
                  key: jwt-secret
            - name: CLIENT_URL
              value: "http://YOUR_DOMAIN"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: snapgram
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: snapgram
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi