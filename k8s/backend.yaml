apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: snapgram
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: gcr.io/${{ secrets.GCP_PROJECT }}/backend:latest
          ports:
            - containerPort: 5000
          env:
            env:
            - name: MONGO_URL
              value: "mongodb://mongo-service:27017/db"

            - name: REDIS_URL
              value: "redis://redis-service:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: snapgram
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP