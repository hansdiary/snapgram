apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: snapgram

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: us-central1-docker.pkg.dev/PROJECT_ID/snapgram/snapgram-backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000
              name: http

          env:
            - name: PORT
              value: "5000"

            - name: NODE_ENV
              value: "production"

            - name: CLIENT_URL
              value: "http://136.110.175.225"

            - name: MONGO_URL
              value: "mongodb://mongo-service:27017/snapgram"

            - name: REDIS_URL
              value: "redis://redis-service:6379"

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: snapgram-secrets
                  key: jwt-secret

          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "1000m"
              memory: "1Gi"