apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: snapgram
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/PROJECT_ID/snapgram/snapgram-backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000
              name: http

          # Variables d'environnement normales
          env:
            - name: PORT
              value: "5000"

            - name: MONGO_URL
              value: "mongodb://mongo-service:27017/snapgram"

            - name: REDIS_URL
              value: "redis://redis-service:6379"

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: snapgram-secrets
                  key: jwt-secret

            - name: CLIENT_URL
              value: "http://136.110.175.225"

            - name: NODE_ENV
              value: "production"

          # 🔥 Injection complète du secret (Cloudinary inclus)
          envFrom:
            - secretRef:
                name: snapgram-secrets

          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: snapgram
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      name: http
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800